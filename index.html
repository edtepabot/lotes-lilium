<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación de Lotes – Lilium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#2d6a4f;
  --verde-claro:#52b788;
  --verde-bg:#d8f3dc;
  --amarillo:#b5830e;
  --amarillo-bg:#fff3cd;
  --rojo:#c1121f;
  --rojo-bg:#ffe0e0;
  --gris:#6c757d;
  --gris-bg:#f0f0f0;
  --papel:#faf7f2;
  --tinta:#1a1a2e;
  --morado:#7b2d8b;
  --morado-claro:#c77dff;
  --morado-bg:#f3d6f7;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--papel);
  font-family:'Source Sans 3',sans-serif;
  color:var(--tinta);
  min-height:100vh;
}

header{
  background:var(--verde);
  padding:28px 40px 22px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
}

header h1{
  font-family:'Playfair Display',serif;
  color:#fff;
  font-size:2rem;
  line-height:1.1;
}

header p{
  color:#b7e4c7;
  font-size:.95rem;
  font-weight:300;
  margin-top:4px;
}

.badge{
  background:var(--verde-claro);
  color:#fff;
  padding:8px 20px;
  border-radius:40px;
  font-size:.95rem;
  font-weight:600;
}

#loading{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:80px 20px;
  gap:16px;
  color:var(--gris);
}

.spinner{
  width:48px;
  height:48px;
  border:5px solid #dee2e6;
  border-top-color:var(--verde-claro);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

#err{
  display:none;
  margin:40px;
  padding:20px 24px;
  background:var(--rojo-bg);
  border-left:4px solid var(--rojo);
  border-radius:10px;
  color:var(--rojo);
}

.resumen{
  display:flex;
  gap:16px;
  padding:28px 40px 0;
  flex-wrap:wrap;
}

.ri{
  flex:1 1 130px;
  background:#fff;
  border-radius:14px;
  padding:18px 20px;
  text-align:center;
  border:2px solid transparent;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.ri .num{
  font-size:2.2rem;
  font-weight:700;
  line-height:1;
}

.ri .lbl{
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--gris);
  margin-top:4px;
}

.ri.bien{border-color:var(--verde-claro);}
.ri.bien .num{color:var(--verde);}

.ri.ade{border-color:#f6c90e;}
.ri.ade .num{color:var(--amarillo);}

.ri.ret{border-color:#e76f51;}
.ri.ret .num{color:var(--rojo);}

.ri.pend{border-color:#dee2e6;}
.ri.pend .num{color:var(--gris);}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  padding:28px 40px 48px;
}

.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 3px 14px rgba(0,0,0,.07);
  transition:transform .18s, box-shadow .18s;
  display:flex;
  flex-direction:column;
  border:1px solid rgba(0,0,0,.04);
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.ct{
  padding:18px 20px 14px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.cl{
  font-family:'Playfair Display',serif;
  font-size:1.25rem;
  line-height:1;
}

.cm{
  font-size:.8rem;
  color:var(--gris);
  margin-top:3px;
}

.pill{
  padding:5px 13px;
  border-radius:30px;
  font-size:.78rem;
  font-weight:700;
  text-transform:uppercase;
  white-space:nowrap;
}

.pb{background:var(--verde-bg);color:var(--verde);}
.pa{background:var(--amarillo-bg);color:var(--amarillo);}
.pr{background:var(--rojo-bg);color:var(--rojo);}
.pp{background:var(--gris-bg);color:var(--gris);}

.pw{
  padding:0 20px 14px;
}

.pl{
  display:flex;
  justify-content:space-between;
  font-size:.78rem;
  color:var(--gris);
  margin-bottom:6px;
}

.pt{
  background:#e9ecef;
  border-radius:99px;
  height:10px;
  overflow:hidden;
}

.pf{
  height:100%;
  border-radius:99px;
  transition:width .5s ease;
}

.fb{background:var(--verde-claro);}
.fa{background:#f6c90e;}
.fr{background:#e76f51;}
.fp{background:#ced4da;}

.cd{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:#f0f0f0;
  border-top:1px solid #f0f0f0;
  border-bottom:1px solid #f0f0f0;
}

.dc{
  background:#fff;
  padding:10px 16px;
  text-align:center;
}

.dc .val{
  font-size:1.1rem;
  font-weight:700;
}

.dc .key{
  font-size:.7rem;
  color:var(--gris);
  text-transform:uppercase;
  letter-spacing:.8px;
  margin-top:2px;
}

.cf2{
  padding:12px 20px 18px;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.tm{
  display:inline-block;
  background:var(--amarillo-bg);
  color:var(--amarillo);
  border-radius:6px;
  font-size:.78rem;
  font-weight:600;
  padding:3px 10px;
  align-self:flex-start;
}

.nt{
  font-size:.85rem;
  color:#495057;
  line-height:1.45;
  font-style:italic;
  border-left:3px solid #dee2e6;
  padding-left:10px;
}

.sd{
  color:#ced4da;
  font-size:.82rem;
  padding:6px 0;
}

/* RESALTADO DE CORTANDO */
.ri.cort{border-color:var(--morado);}
.ri.cort .num{color:var(--morado);}
.pc{background:var(--morado-bg);color:var(--morado);}
.fc{background:var(--morado-claro);}
.card-cort{
  border:2px solid var(--morado-claro);
  box-shadow:0 3px 18px rgba(123,45,139,.18);
}

/* NUEVOS BORDES DELGADOS PARA STATUS */
.card-bien{
  border:1.5px solid var(--verde-claro);
  box-shadow:0 3px 14px rgba(82,183,136,.10);
}

.card-ade{
  border:1.5px solid #f6c90e;
  box-shadow:0 3px 14px rgba(246,201,14,.10);
}

.card-ret{
  border:1.5px solid #e76f51;
  box-shadow:0 3px 14px rgba(231,111,81,.10);
}

.nf{
  font-size:.85rem;
  color:#2d6a4f;
  line-height:1.45;
  font-weight:600;
  border-left:3px solid #52b788;
  padding-left:10px;
  margin-top:2px;
}

@media(max-width:600px){
  header{padding:20px;}
  .resumen,.grid{
    padding-left:16px;
    padding-right:16px;
  }
}
</style>
</head>
<body>
<header>
  <div>
    <h1>🌸 Evaluación de Lotes</h1>
    <p>Estado actual · Plantaciones de Lilium</p>
  </div>
  <div class="badge" id="badge">Cargando...</div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando datos de Google Sheets...</p>
</div>

<div id="err">No se pudo cargar la información. Recarga la página.</div>
<div class="resumen" id="res" style="display:none"></div>
<div class="grid" id="grid" style="display:none"></div>

<script>
var SU="https://script.google.com/macros/s/AKfycbx327VQ0fF0dQjX9AIWKaWDYXhLCRKRp3IXvukBx0Vj8spI99r7AaJchWctASw2LJCF/exec";

function sISO(f){
  var d=new Date(f);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  var y=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-y)/86400000)+1)/7);
}

var HOY=sISO(new Date()), ANIO=new Date().getFullYear();
document.getElementById("badge").textContent="Semana "+HOY+" · "+ANIO;

function L(v){
  if(v===null||v===undefined)return null;
  var s=String(v).trim();
  return (s===""||s==="#N/A"||s==="#NAME?"||s==="1899-12-30 00:00:00"||s==="0") ? null : s;
}

function E(s){
  if(!s)return "PENDIENTE";
  var u=s.toUpperCase();
  if(u.indexOf("BIEN")>=0)return "VA BIEN";
  if(u.indexOf("ADELANTADO")>=0)return "ADELANTADO";
  if(u.indexOf("RETRASADO")>=0)return "RETRASADO";
  return "PENDIENTE";
}

function CP(e){
  return {
    "VA BIEN":"pb",
    "ADELANTADO":"pa",
    "RETRASADO":"pr",
    "PENDIENTE":"pp"
  }[e] || "pp";
}

function CF(e){
  return {
    "VA BIEN":"fb",
    "ADELANTADO":"fa",
    "RETRASADO":"fr",
    "PENDIENTE":"fp"
  }[e] || "fp";
}

function CC(e, esCort){
  if(esCort) return " card-cort";
  return {
    "VA BIEN":" card-bien",
    "ADELANTADO":" card-ade",
    "RETRASADO":" card-ret",
    "PENDIENTE":""
  }[e] || "";
}

function PC(s){
  var n=parseInt(s);
  if(isNaN(n)||n<=HOY)return 100;
  return Math.min(100,Math.round((1/(n-HOY+1))*100));
}

fetch(SU)
.then(function(r){return r.json();})
.then(function(data){
  document.getElementById("loading").style.display="none";

  var lotes=data.filter(function(row){
    var id=L(row['ID_LOTE']), st=L(row['STATUS_ACTUAL']);
    if(!id)return false;
    if(st && st.toUpperCase()==='CORTADO')return false;
    return true;
  });

  var cnt={'VA BIEN':0,'ADELANTADO':0,'RETRASADO':0,'PENDIENTE':0,'CORTANDO':0};

  lotes.forEach(function(l){
    var st=L(l['STATUS_ACTUAL'])||'';
    if(st.toUpperCase()==='SEMANA CORTANDOSE') cnt['CORTANDO']++;
    else cnt[E(st)]++;
  });

  var res=document.getElementById('res');
  res.style.display='flex';

  [
    {k:'CORTANDO',c:'cort',l:'Cortando'},
    {k:'VA BIEN',c:'bien',l:'Van bien'},
    {k:'ADELANTADO',c:'ade',l:'Adelantados'},
    {k:'RETRASADO',c:'ret',l:'Retrasados'},
    {k:'PENDIENTE',c:'pend',l:'Sin evaluar'}
  ].forEach(function(r){
    if(r.k==='CORTANDO' && cnt[r.k]===0)return;
    res.innerHTML += '<div class="ri '+r.c+'"><div class="num">'+cnt[r.k]+'</div><div class="lbl">'+r.l+'</div></div>';
  });

  var grid=document.getElementById('grid');
  grid.style.display='grid';

  lotes.sort(function(a,b){
    var sa=(L(a['STATUS_ACTUAL'])||'').toUpperCase();
    var sb2=(L(b['STATUS_ACTUAL'])||'').toUpperCase();
    if(sa==='SEMANA CORTANDOSE' && sb2!=='SEMANA CORTANDOSE')return -1;
    if(sb2==='SEMANA CORTANDOSE' && sa!=='SEMANA CORTANDOSE')return 1;
    return 0;
  });

  lotes.forEach(function(l){
    var id=L(l['ID_LOTE'])||'?';
    var mod=L(l['MODULO'])||'?';
    var semP=L(l['SEMANA_PLANTACION']);
    var semO=L(l['SEMANA_OBJETIVO']);
    var cant=L(l['CANTIDAD']);
    var st=L(l['STATUS_ACTUAL']);
    var sev=L(l['SEVERIDAD_ACTUAL']);
    var man=L(l['MANEJO_ACTUAL']);
    var nota=L(l['NOTAS_ULT']);
    var notaFija=L(l['NOTA_FIJA']);

    var esCort=st && st.toUpperCase()==='SEMANA CORTANDOSE';
    var e=esCort ? 'SEMANA CORTANDOSE' : E(st);
    var p=esCort ? 100 : (semO ? PC(semO) : 5);
    var cf=(cant && !isNaN(Number(cant))) ? Number(cant).toLocaleString('es-MX') : '?';

    var sb=sev
      ? '<span style="font-size:.72rem;background:#fff3e0;color:#e65100;border-radius:5px;padding:2px 8px;font-weight:600;margin-left:6px;">'+sev+'</span>'
      : '';

    var pillCls=esCort ? 'pc' : CP(e);
    var fillCls=esCort ? 'fc' : CF(e);
    var cardCls=CC(e, esCort);

    var notasFila='';
    if(notaFija) notasFila+='<p class="nf">📌 '+notaFija+'</p>';
    if(nota) notasFila+='<p class="nt">📝 '+nota+'</p>';
    if(!notaFija && !nota) notasFila='<p class="sd">Sin notas adicionales</p>';

    grid.innerHTML +=
      '<div class="card'+cardCls+'">' +
        '<div class="ct">' +
          '<div>' +
            '<div class="cm">Módulo '+mod+(semP ? ' · Sem. '+semP : '')+'</div>' +
            '<div class="cl">Lote '+id+'</div>' +
          '</div>' +
          '<span class="pill '+pillCls+'">'+(esCort ? '✂️ CORTANDO' : e)+sb+'</span>' +
        '</div>' +

        '<div class="pw">' +
          '<div class="pl"><span>Progreso</span><span>🎯 Corte sem. '+(semO||'?')+'</span></div>' +
          '<div class="pt"><div class="pf '+fillCls+'" style="width:'+p+'%"></div></div>' +
        '</div>' +

        '<div class="cd">' +
          '<div class="dc"><div class="val">'+cf+'</div><div class="key">Plantas</div></div>' +
          '<div class="dc"><div class="val">Sem. '+(semO||'?')+'</div><div class="key">Semana objetivo</div></div>' +
        '</div>' +

        '<div class="cf2">' +
          (man ? '<span class="tm">🔧 '+man+'</span>' : '') +
          notasFila +
        '</div>' +
      '</div>';
  });
})
.catch(function(){
  document.getElementById("loading").style.display="none";
  document.getElementById("err").style.display="block";
});
</script>
</body>
</html>
